{% extends "base.html" %}
{% block title %}Courses{% endblock %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center">
    <h3>Courses</h3>
    {% if current_user.role == 'TEACHER' %}
      <a class="btn btn-primary" href="{{ url_for('courses.create_course') }}">+ Tạo course</a>
    {% endif %}
  </div>

  <div class="list-group mt-3">
    {% for c in courses %}
      <a class="list-group-item list-group-item-action" href="{{ url_for('courses.detail_course', course_id=c.id) }}">
        <div class="d-flex justify-content-between">
          <div><b>{{ c.code }}</b> — {{ c.name }}</div>
          <span class="text-muted">ID: {{ c.id }}</span>
        </div>
      </a>
    {% else %}
      <div class="text-muted">Chưa có course.</div>
    {% endfor %}
  </div>
{% endblock %}
